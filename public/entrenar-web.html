<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Entrenar IA desde Web - ClubBot IA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Inter,Arial,sans-serif;background:#0f172a;color:#e5e7eb;margin:0;padding:24px}
    .card{max-width:900px;margin:auto;background:#111827;border:1px solid #263244;border-radius:22px;padding:24px;box-shadow:0 20px 60px #0005}
    h1{margin-top:0}.url{background:#0b1220;border:1px solid #334155;border-radius:14px;padding:14px;color:#fde047}
    button{border:0;border-radius:14px;padding:14px 18px;background:#facc15;color:#111827;font-weight:800;cursor:pointer}
    pre{white-space:pre-wrap;background:#0b1220;border-radius:14px;padding:16px;border:1px solid #334155}
    a{color:#fde047}
  </style>
</head>
<body>
  <div class="card">
    <h1>🧠 Entrenar ClubBot IA desde web oficial</h1>
    <p>Esta pantalla carga información pública de la web oficial de All Boys en <b>Documentos IA</b>.</p>
    <div class="url">https://cluballboyslapampa.org/</div>
    <p><button onclick="train()">Entrenar IA con la web</button> <a href="/">Volver al panel</a></p>
    <pre id="out">Listo para entrenar...</pre>
  </div>
<script>
async function train(){
  const out = document.getElementById('out');
  out.textContent = 'Entrenando...';
  const r = await fetch('/api/train/website', {method:'POST'});
  const data = await r.json();
  out.textContent = JSON.stringify(data,null,2);
}
</script>
</body>
</html>
